<body>
        <div class="container">
            <div class="row">
                <div class="col-lg-12">
                    <div class="title-all text-center">
                        <h1>All Products</h1><br>
                    </div>
                </div>
            </div>
        </div>
      <div class="row row-cols-1 row-cols-md-5 g-5">
        <div class="col" *ngFor= "let product of produits">
          <div class="card" >
            <img [src]="'http://localhost:3000/'+product.img" class="card-img-top" alt="Hollywood Sign on The Hill"/>
            <div class="card-body">
              <h5 class="card-title">{{ product.Pname }}</h5>
              <p class="card-text">
                {{ product.Price }} <br>
                {{ product.Desc }}
              </p>
              <div class="buttons d-flex flex-row">
                <div class="text-center my-4"> <a (click)="_addItemToCart(product._id, 1)" class="btn" style="background-color: #E89F71;">Add to Cart</a> </div>
            </div>
            </div>
          </div>
        </div>
     </div>
     <div class="gallery">
      <div class="content" *ngFor= "let product of produits">
          <img [src]="'http://localhost:3000/'+product.img">
          <h3>{{ product.Pname }}</h3>
          <p>{{ product.Desc }}</p>
          <h6>{{ product.Price }}</h6>
          <ul>
              <li><i class="fa fa-star checked"></i></li>
              <li><i class="fa fa-star checked"></i></li>
              <li><i class="fa fa-star checked"></i></li>
              <li><i class="fa fa-star checked"></i></li>
              <li><i class="fa fa-star"></i></li>
          </ul>
          <button class="buy-3">Ajouter au Panier</button>
      </div>
  </div>
</body>
